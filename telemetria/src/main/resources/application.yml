spring:
  datasource:
    url: jdbc:postgresql://postgres-mensageria:5432/mensageria
    username: postgres
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /

# ADICIONE ESTE BLOCO ABAIXO (Fora do bloco spring:)
rabbitmq:
  queue:
    name: telemetria.queue
  exchange:
    name: telemetria.exchange
  routingkey:
    name: telemetria.routing.key